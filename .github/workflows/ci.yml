name: CI

# Запускается при каждом push в master и при открытии/обновлении PR в master.
# Защита ветки (branch protection) требует, чтобы job `test` был зелёным для merge.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Отменяем устаревшие прогоны того же PR/ветки — экономит минуты CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test  # имя, которое пойдёт в required status checks (branch protection)
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: checkout кода
      - name: Checkout
        uses: actions/checkout@v4

      # Шаг 2: установка Python (3.9 — минимальная заявленная версия проекта)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: requirements.txt

      # Шаг 3: установка зависимостей (pytest + ruff + black)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Шаг 4: прогон всех тестов (cyborg + idea_engine + panel = 453 теста)
      # run_tests.py запускает каждый пакет в ОТДЕЛЬНОМ процессе, чтобы обойти коллизию
      # имён модулей между cyborg и idea_engine (оба имеют run.py/store.py/...).
      # Голый pytest из корня ВРАЛ бы на этой коллизии — поэтому только через раннер.
      - name: Run tests
        run: python run_tests.py

      # Шаг 5: проверка стиля линтером ruff (конфиг в pyproject.toml)
      - name: Lint with ruff
        run: ruff check .

      # Шаг 6: проверка форматирования black (конфиг в pyproject.toml)
      - name: Check formatting with black
        run: black --check .
